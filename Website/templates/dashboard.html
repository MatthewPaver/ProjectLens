{% extends 'base.html' %}

{% block title %}Dashboard - ProjectLens{% endblock %}

{% block content %}
<section class="container py-4">
  <div class="d-flex justify-content-between align-items-end gap-3 flex-wrap mb-3">
    <div>
      <p class="text-uppercase text-muted small mb-1">Decision support</p>
      <h1 class="h2 mb-1">Project Risk Command Centre</h1>
      <p class="text-muted mb-0">Compare recovery options, explain the evidence and preserve the decision outcome.</p>
    </div>
    <a class="btn btn--primary" href="{{ url_for('command_centre') }}" target="_blank">Open full screen</a>
  </div>
  <div class="ratio ratio-16x9 border bg-dark">
    <iframe title="ProjectLens Risk Command Centre" src="{{ url_for('command_centre') }}" allowfullscreen></iframe>
  </div>
</section>
{% endblock %}
