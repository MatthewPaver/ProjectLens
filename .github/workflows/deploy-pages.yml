name: Test and deploy command centre

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run decision and pipeline tests
        run: python -m pytest Processing/tests -q
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload static command centre
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
