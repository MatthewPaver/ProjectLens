<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ProjectLens architecture</title>
  <desc id="desc">Uploaded schedule files flow through validation, cleaning, risk analysis, and reporting outputs for Power BI and CSV review.</desc>
  <rect width="1200" height="360" fill="#fbfaf7"/>
  <text x="54" y="58" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#151515">Architecture at a glance</text>
  <text x="54" y="88" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="17" font-weight="650" fill="#57534e">Schedule files move through a Flask upload workflow into repeatable risk outputs.</text>
  <g font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-weight="800">
    <rect x="54" y="144" width="176" height="96" fill="#ffffff" stroke="#151515" stroke-width="2"/>
    <text x="83" y="186" font-size="20" fill="#151515">Upload UI</text>
    <text x="83" y="214" font-size="14" fill="#57534e">CSV / Excel</text>
    <rect x="284" y="144" width="176" height="96" fill="#f4f0e9" stroke="#151515" stroke-width="2"/>
    <text x="316" y="186" font-size="20" fill="#151515">Validation</text>
    <text x="316" y="214" font-size="14" fill="#57534e">schema checks</text>
    <rect x="514" y="144" width="176" height="96" fill="#f4f0e9" stroke="#151515" stroke-width="2"/>
    <text x="548" y="186" font-size="20" fill="#151515">Analysis</text>
    <text x="548" y="214" font-size="14" fill="#57534e">risk modules</text>
    <rect x="744" y="144" width="176" height="96" fill="#0f766e"/>
    <text x="779" y="186" font-size="20" fill="#ffffff">Outputs</text>
    <text x="779" y="214" font-size="14" fill="#d7f6f0">CSV reports</text>
    <rect x="974" y="144" width="176" height="96" fill="#151515"/>
    <text x="1003" y="186" font-size="20" fill="#ffffff">Power BI</text>
    <text x="1003" y="214" font-size="14" fill="#d8d2c8">handoff artefacts</text>
  </g>
  <g stroke="#0f766e" stroke-width="4" fill="none">
    <path d="M230 192h54"/>
    <path d="M460 192h54"/>
    <path d="M690 192h54"/>
    <path d="M920 192h54"/>
  </g>
</svg>
